<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Simple To-Do List</h1>
    <main id="task-container">
      <div class="block pending-block">
        <h2 class="pending-title">Gabriel, salve meu Quirido!</h2>
      </div>
      <div class="block doing-block">
        <h2 class="doing-title">Doing</h2>
      </div>
      <div class="block done-block">
        <h2 class="done-title">Done</h2>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
