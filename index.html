<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Simple To-Do List (Kanban like)</h1>
    <main id="task-container">
      <div class="block pending-block">
        <h2 class="pending-title">Pending</h2>
        <input
          class="task-input pending-input"
          type="text"
          maxlength="30"
          placeholder="Add a new task..."
        />
        <ul id="pending-list"></ul>
      </div>
      <div class="block doing-block">
        <h2 class="doing-title">Doing</h2>
        <input
          class="task-input doing-input"
          type="text"
          maxlength="30"
          placeholder="Add a new task..."
        />
        <ul id="doing-list"></ul>
      </div>
      <div class="block done-block">
        <h2 class="done-title">Done</h2>
        <input
          class="task-input done-input"
          type="text"
          maxlength="30"
          placeholder="Add a new task..."
        />
        <ul id="done-list"></ul>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
